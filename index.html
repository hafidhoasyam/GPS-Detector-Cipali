<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Detector Cipali</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:30px 20px;
text-align:center;
}

.logo{
margin-bottom:15px;
}

.logo img{
width:180px;
max-width:90%;
}

.title{
font-size:28px;
font-weight:700;
color:#222;
margin-bottom:40px;
}

.sta-label{
font-size:72px;
font-weight:800;
color:#f57c00;
}

.sta-number{
font-size:68px;
font-weight:800;
color:#f57c00;
margin-top:5px;
margin-bottom:25px;
}

.offset{
font-size:28px;
color:#222;
margin-bottom:15px;
}

.speed{
font-size:26px;
font-weight:700;
color:#444;
margin-bottom:20px;
}

.segment{
font-size:28px;
font-weight:700;
color:#111;
margin-bottom:20px;
}

.jalur{
font-size:28px;
font-weight:700;
color:#f57c00;
margin-bottom:15px;
}

.status{
font-size:16px;
color:#777;
line-height:1.5;
}

@media(max-width:480px){

.logo img{
width:150px;
}

.title{
font-size:24px;
}

.sta-label{
font-size:60px;
}

.sta-number{
font-size:58px;
}

.segment{
font-size:24px;
}

.jalur{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Logo_LMS.png">
</div>

<div class="title">
STA Cikopo - Palimanan
</div>

<div class="sta-label">
STA
</div>

<div class="sta-number" id="sta">
Loading...
</div>

<div class="offset" id="offset">
Offset ...
</div>

<div class="speed" id="speed">
0 km/h
</div>

<div class="segment" id="segment">
Loading Segment...
</div>

<div class="jalur" id="jalur">
Detecting Direction...
</div>

<div class="status" id="status">
Waiting GPS...
</div>

</div>

<script>

/* =======================================
DATABASE
======================================= */

let staData=[];

/* =======================================
SETTING
======================================= */

const MAX_OFFSET=20;
const MAX_GPS_ACCURACY=15;
const MIN_DIRECTION_DELTA=10;
const UPDATE_INTERVAL=100;
const HISTORY_SIZE=5;

/* =======================================
VARIABLE
======================================= */

function findSTA(lat,lon){

let start;
let end;

/* =====================================
FIRST FIX
Cari seluruh dataset saat pertama kali
===================================== */

if(firstFix){

start=0;
end=staData.length-1;

}else{

start=Math.max(
0,
lastNearestIndex-150
);

end=Math.min(
staData.length-1,
lastNearestIndex+150
);

}

let min=999999;
let bestIndex=0;

/* =====================================
SEARCH
===================================== */

for(let i=start;i<=end;i++){

let p=staData[i];

let d=distance(
lat,
lon,
p.lat,
p.lon
);

if(d<min){

min=d;
bestIndex=i;

}

}

lastNearestIndex=bestIndex;

firstFix=false;

let p=staData[bestIndex];

/* =====================================
OFF ROUTE
===================================== */

if(min>MAX_OFFSET){

offRouteCounter++;

}else{

offRouteCounter=0;

}

/* =====================================
OUTSIDE ALIGNMENT
===================================== */

if(offRouteCounter>=3){

document.getElementById("sta").innerHTML=
"---";

document.getElementById("offset").innerHTML=
"Offset ---";

document.getElementById("segment").innerHTML=
"Outside Alignment";

document.getElementById("status").innerHTML=
"Outside Alignment";

return;

}

/* =====================================
DISPLAY
===================================== */

document.getElementById("sta").innerHTML=
formatSTA(p.sta);

document.getElementById("offset").innerHTML=
"Offset "+min.toFixed(1)+" m";

document.getElementById("segment").innerHTML=
p.segment;

document.getElementById("status").innerHTML=
"GPS Active";

}

/* =======================================
DISTANCE
======================================= */

function distance(lat1,lon1,lat2,lon2){

const R=6371000;

let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

/* =======================================
FORMAT STA
======================================= */

function formatSTA(sta){

let km=Math.floor(sta/1000);

let meter=Math.round(sta%1000);

return km+"+"+meter.toString().padStart(3,"0");

}

/* =======================================
FIND STA
======================================= */

function findSTA(lat,lon){

let start=Math.max(0,lastNearestIndex-100);

let end=Math.min(
staData.length-1,
lastNearestIndex+100
);

let min=999999;

let bestIndex=lastNearestIndex;

for(let i=start;i<=end;i++){

let p=staData[i];

let d=distance(
lat,
lon,
p.lat,
p.lon
);

if(d<min){

min=d;
bestIndex=i;

}

}

lastNearestIndex=bestIndex;

let p=staData[bestIndex];

if(min>MAX_OFFSET){

offRouteCounter++;

}else{

offRouteCounter=0;

}

if(offRouteCounter>=3){

document.getElementById("status").innerHTML=
"Outside Alignment";

return;

}

let sta=p.sta;

staHistory.push(sta);

if(staHistory.length>HISTORY_SIZE){

staHistory.shift();

}

if(staHistory.length>=2){

let delta=
staHistory[staHistory.length-1]
-
staHistory[0];

if(delta>=MIN_DIRECTION_DELTA){

lockedJalur=
"Cikopo → Palimanan";

}
else if(delta<=-MIN_DIRECTION_DELTA){

lockedJalur=
"Palimanan → Cikopo";

}

}

document.getElementById("sta").innerHTML=
formatSTA(sta);

document.getElementById("offset").innerHTML=
"Offset "+min.toFixed(1)+" m";

document.getElementById("segment").innerHTML=
p.segment;

document.getElementById("jalur").innerHTML=
lockedJalur;

document.getElementById("status").innerHTML=
"GPS Active";

}

/* =======================================
START GPS
======================================= */

function startGPS(){

navigator.geolocation.watchPosition(

function(pos){

let now=Date.now();

if(now-lastUpdate<UPDATE_INTERVAL){

return;

}

lastUpdate=now;

if(pos.coords.accuracy>
MAX_GPS_ACCURACY){

document.getElementById("status").innerHTML=
"Poor GPS Accuracy";

return;

}

let speed=
(pos.coords.speed||0)*3.6;

document.getElementById("speed").innerHTML=
speed.toFixed(1)+" km/h";

if(speed>25){

GPS_SMOOTHING=1;

}
else if(speed>15){

GPS_SMOOTHING=2;

}
else if(speed>5){

GPS_SMOOTHING=3;

}
else{

GPS_SMOOTHING=5;

}

gpsHistory.push({

lat:pos.coords.latitude,
lon:pos.coords.longitude

});

if(gpsHistory.length>
GPS_SMOOTHING){

gpsHistory.shift();

}

let lat=0;
let lon=0;

gpsHistory.forEach(p=>{

lat+=p.lat;
lon+=p.lon;

});

lat/=gpsHistory.length;
lon/=gpsHistory.length;

findSTA(lat,lon);

},

function(){

document.getElementById("status").innerHTML=
"GPS Error";

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
}

);

}

/* =======================================
LOAD CSV
======================================= */

fetch("sta_cipali.csv")

.then(r=>r.text())

.then(text=>{

let rows=
text.trim().split("\n");

rows.shift();

rows.forEach(r=>{

let c=r.split(",");

if(c.length>=4){

staData.push({

sta:parseFloat(c[0]),
lat:parseFloat(c[1]),
lon:parseFloat(c[2]),
segment:c[3]

});

}

});

document.getElementById("status").innerHTML=
"GPS Ready";

startGPS();

})

.catch(()=>{

document.getElementById("status").innerHTML=
"CSV Load Failed";

});

</script>

</body>

</html>
