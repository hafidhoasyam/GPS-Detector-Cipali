<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automatic GPS STA Tol</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:white;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

}

.container{

width:100%;
max-width:420px;

padding:30px 20px;

text-align:center;

}

/* =========================
LOGO
========================= */

.logo{

margin-bottom:20px;

}

.logo img{

width:180px;
max-width:90%;

}

/* =========================
TITLE
========================= */

.title{

font-size:28px;
font-weight:700;
color:#222;

line-height:1.2;

margin-bottom:55px;

}

/* =========================
STA LABEL
========================= */

.sta-label{

font-size:78px;
font-weight:800;
color:#f57c00;

line-height:1;

}

/* =========================
STA NUMBER
========================= */

.sta-number{

font-size:72px;
font-weight:800;
color:#f57c00;

line-height:1.05;

margin-top:8px;
margin-bottom:45px;

}

/* =========================
OFFSET
========================= */

.offset{

font-size:30px;
color:#222;

margin-bottom:40px;

}

/* =========================
SEGMENT
========================= */

.segment{

font-size:32px;
font-weight:700;
color:#111;

line-height:1.2;

margin-bottom:28px;

}

/* =========================
JALUR
========================= */

.jalur{

font-size:34px;
font-weight:700;
color:#f57c00;

}

/* =========================
STATUS
========================= */

.status{

margin-top:25px;

font-size:18px;
color:#777;

line-height:1.5;

}

/* =========================
RESPONSIVE MOBILE
========================= */

@media(max-width:480px){

.logo img{
width:160px;
}

.title{
font-size:24px;
margin-bottom:45px;
}

.sta-label{
font-size:68px;
}

.sta-number{
font-size:64px;
}

.offset{
font-size:24px;
}

.segment{
font-size:26px;
}

.jalur{
font-size:28px;
}

.status{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- =========================
LOGO
========================= -->

<div class="logo">

<img src="Logo_LMS.png">

</div>

<!-- =========================
TITLE
========================= -->

<div class="title">
STA Cikopo - Palimanan
</div>

<!-- =========================
STA
========================= -->

<div class="sta-label">
STA
</div>

<div class="sta-number" id="sta">
Loading...
</div>

<!-- =========================
OFFSET
========================= -->

<div class="offset" id="offset">
Offset ...
</div>

<!-- =========================
SEGMENT
========================= -->

<div class="segment" id="segment">
Loading Segment...
</div>

<!-- =========================
JALUR
========================= -->

<div class="jalur" id="jalur">
Detecting Direction...
</div>

<!-- =========================
STATUS
========================= -->

<div class="status" id="status">
Waiting GPS...
</div>

</div>

<script>

/* =====================================
DATABASE
===================================== */

let staData=[];

/* =====================================
SETTING
===================================== */

/* Maksimum offset centerline */

const MAX_OFFSET = 30;

/* Maksimum GPS accuracy */

const MAX_GPS_ACCURACY = 15;

/* Minimal delta STA */

const MIN_DIRECTION_DELTA = 10;

/* History STA */

const HISTORY_SIZE = 3;

/* Update interval */

const UPDATE_INTERVAL = 250;

/* =====================================
VARIABLE
===================================== */

let staHistory=[];

let gpsHistory=[];

let GPS_SMOOTHING = 5;

let lockedJalur="Detecting Direction...";

let lastUpdate=0;

let offRouteCounter=0;

/* =====================================
DISTANCE FUNCTION
===================================== */

function distance(lat1,lon1,lat2,lon2){

let R=6371000;

let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* =====================================
FORMAT STA
59885 -> 59+885
===================================== */

function formatSTA(staValue){

let km=Math.floor(staValue/1000);

let meter=Math.round(staValue%1000);

return km+"+"+meter.toString().padStart(3,'0');

}

/* =====================================
FIND STA
===================================== */

function findSTA(lat,lon){

let min=999999;

let index=0;

/* Cari titik STA terdekat */

staData.forEach((p,i)=>{

let d=distance(lat,lon,p.lat,p.lon);

if(d<min){

min=d;
index=i;

}

});

/* Ambil titik terdekat */

let p1=staData[index];

/* =====================================
OFF ROUTE VALIDATION
===================================== */

if(min > MAX_OFFSET){

offRouteCounter++;

}
else{

offRouteCounter=0;

}

/* Jika benar-benar off route */

if(offRouteCounter >= 3){

document.getElementById("status").innerHTML=
"Outside Alignment";

return;

}

/* =====================================
STA TERDEKAT
===================================== */

let sta=p1.sta;

/* =====================================
UPDATE HISTORY STA
===================================== */

staHistory.push(sta);

/* Maksimum history */

if(staHistory.length > HISTORY_SIZE){

staHistory.shift();

}

/* =====================================
DETEKSI ARAH
===================================== */

if(staHistory.length >= 2){

let firstSTA=staHistory[0];

let lastSTA=
staHistory[staHistory.length-1];

let delta=lastSTA-firstSTA;

/* Menuju Palimanan */

if(delta >= MIN_DIRECTION_DELTA){

lockedJalur="Jalur A";

/* Menuju Cikopo */

}
else if(delta <= -MIN_DIRECTION_DELTA){

lockedJalur="Jalur B";

}

}

/* =====================================
DISPLAY STA
===================================== */

document.getElementById("sta").innerHTML=
formatSTA(sta);

/* =====================================
DISPLAY OFFSET
===================================== */

document.getElementById("offset").innerHTML=
"Offset "+min.toFixed(1)+" m";

/* =====================================
DISPLAY SEGMENT
===================================== */

document.getElementById("segment").innerHTML=
p1.segment;

/* =====================================
DISPLAY JALUR
===================================== */

document.getElementById("jalur").innerHTML=
lockedJalur;

/* =====================================
DISPLAY STATUS
===================================== */

document.getElementById("status").innerHTML=
"GPS Active";

}

/* =====================================
START GPS
===================================== */

function startGPS(){

if(!navigator.geolocation){

alert("GPS tidak didukung browser");

return;

}

navigator.geolocation.watchPosition(

function(pos){

/* =====================================
UPDATE THROTTLING
===================================== */

let now=Date.now();

if(now-lastUpdate < UPDATE_INTERVAL){

return;

}

lastUpdate=now;

/* =====================================
GPS ACCURACY FILTER
===================================== */

if(pos.coords.accuracy > MAX_GPS_ACCURACY){

document.getElementById("status").innerHTML=
"Poor GPS Accuracy";

return;

}

/* =====================================
SPEED ADAPTIVE SMOOTHING
===================================== */

let speed = pos.coords.speed || 0;

/* m/s */

if(speed > 20){

GPS_SMOOTHING = 2;

}
else if(speed > 10){

GPS_SMOOTHING = 3;

}
else{

GPS_SMOOTHING = 5;

}

/* =====================================
GPS SMOOTHING
===================================== */

gpsHistory.push({

lat:pos.coords.latitude,
lon:pos.coords.longitude

});

/* Maksimum smoothing */

if(gpsHistory.length > GPS_SMOOTHING){

gpsHistory.shift();

}

/* Average latitude longitude */

let lat=0;
let lon=0;

gpsHistory.forEach(p=>{

lat += p.lat;
lon += p.lon;

});

lat = lat / gpsHistory.length;
lon = lon / gpsHistory.length;

/* =====================================
FIND STA
===================================== */

findSTA(lat,lon);

},

function(err){

document.getElementById("status").innerHTML=
"GPS Error";

},

{
enableHighAccuracy:true,
timeout:5000,
maximumAge:0
}

);

}

/* =====================================
LOAD CSV
===================================== */

fetch("sta_cipali.csv")

.then(r=>r.text())

.then(text=>{

let rows=text.split("\n").slice(1);

/* LOOP CSV */

rows.forEach(r=>{

let c=r.split(",");

/* FORMAT:
STA,Lat,Long,Segment
*/

if(c.length>=4){

staData.push({

sta:parseFloat(c[0]),
lat:parseFloat(c[1]),
lon:parseFloat(c[2]),
segment:c[3]

});

}

});

/* =====================================
START GPS
===================================== */

document.getElementById("status").innerHTML=
"GPS Ready";

startGPS();

});

</script>

</body>

</html>
