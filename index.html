<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPS Detector Cipali</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{max-width:420px;width:100%;padding:24px;text-align:center}
.logo img{width:180px;max-width:90%}
.title{font-size:28px;font-weight:700;margin:20px 0 35px;color:#222}
.sta-label{font-size:72px;font-weight:800;color:#f57c00}
.sta-number{font-size:68px;font-weight:800;color:#f57c00}
.offset{font-size:28px;margin-top:20px}
.speed,.accuracy{font-size:22px;margin-top:12px;color:#444}
.segment{font-size:28px;font-weight:700;margin-top:18px}
.status{font-size:18px;color:#666;margin-top:18px}
</style>
</head>
<body>
<div class="container">
<div class="logo"><img src="Logo_LMS.png" alt="Logo"></div>
<div class="title">STA Cikopo - Palimanan</div>
<div class="sta-label">STA</div>
<div class="sta-number" id="sta">Loading...</div>
<div class="offset" id="offset">Offset ...</div>
<div class="speed" id="speed">0.0 km/h</div>
<div class="accuracy" id="accuracy">GPS ...</div>
<div class="segment" id="segment">Loading Segment...</div>
<div class="status" id="status">Loading CSV...</div>
</div>

<script>
const MAX_OFFSET=100;
const MAX_GPS_ACCURACY = 1000;
const UPDATE_INTERVAL=100;
const LOCAL_RADIUS=600;
const JUMP_THRESHOLD=60;

let staData=[];
let lastIndex=-1;
let lastSTA=null;
let lastUpdate=0;

class Kalman{
 constructor(r=0.00001,q=0.0001){this.r=r;this.q=q;this.x=null;this.p=1;}
 filter(z){
  if(this.x===null){this.x=z;return z;}
  this.p+=this.q;
  const k=this.p/(this.p+this.r);
  this.x=this.x+k*(z-this.x);
  this.p=(1-k)*this.p;
  return this.x;
 }
}

const latKF=new Kalman();
const lonKF=new Kalman();

function distance(lat1,lon1,lat2,lon2){
 const R=6371000;
 const dLat=(lat2-lat1)*Math.PI/180;
 const dLon=(lon2-lon1)*Math.PI/180;
 const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function formatSTA(sta){
 const km=Math.floor(sta/1000);
 const m=Math.round(sta%1000);
 return km+"+"+String(m).padStart(3,"0");
}

function nearestPoint(lat,lon){
 let start=0,end=staData.length-1;

 if(lastIndex>=0){
   start=Math.max(0,lastIndex-LOCAL_RADIUS);
   end=Math.min(staData.length-1,lastIndex+LOCAL_RADIUS);
 } else {
   // first fix full search
   start=0; end=staData.length-1;
 }

 let min=Infinity,best=-1;

 for(let i=start;i<=end;i++){
   const d=distance(lat,lon,staData[i].lat,staData[i].lon);
   if(d<min){min=d;best=i;}
 }

 return {idx:best,dist:min,row:staData[best]};
}

function updateDisplay(lat,lon){
 const res=nearestPoint(lat,lon);
 if(!res.row)return;

 let sta=res.row.sta;

 if(lastSTA!==null && Math.abs(sta-lastSTA)>JUMP_THRESHOLD){
   sta=lastSTA;
 }else{
   lastSTA=sta;
   lastIndex=res.idx;
 }

 if(res.dist>MAX_OFFSET){
   document.getElementById("sta").innerHTML="---";
   document.getElementById("offset").innerHTML="Offset ---";
   document.getElementById("segment").innerHTML="Out Of Cipali Area";
   document.getElementById("status").innerHTML="Out Of Cipali Area";
   return;
 }

 document.getElementById("sta").innerHTML=formatSTA(sta);
 document.getElementById("offset").innerHTML="Offset "+res.dist.toFixed(1)+" m";
 document.getElementById("segment").innerHTML=res.row.segment;
 document.getElementById("status").innerHTML="GPS Active";
}

function startGPS(){
 navigator.geolocation.watchPosition(
 pos=>{
   const now=Date.now();
   if(now-lastUpdate<UPDATE_INTERVAL)return;
   lastUpdate=now;

   const acc=pos.coords.accuracy||999;
   document.getElementById("accuracy").innerHTML="GPS ±"+acc.toFixed(1)+" m";

   if(acc>MAX_GPS_ACCURACY){
      document.getElementById("status").innerHTML="GPS Accuracy Poor";
      return;
   }

   const speed=(pos.coords.speed||0)*3.6;
   document.getElementById("speed").innerHTML=speed.toFixed(1)+" km/h";

   const lat=latKF.filter(pos.coords.latitude);
   const lon=lonKF.filter(pos.coords.longitude);

   updateDisplay(lat,lon);
 },
 err=>{
   document.getElementById("status").innerHTML="GPS Error";
   console.log(err);
 },
 {enableHighAccuracy:true,maximumAge:0,timeout:5000}
 );
}

fetch("sta_cipali.csv")
.then(r=>r.text())
.then(text=>{
 const rows=text.trim().split(/\\r?\\n/);
 rows.shift();

 rows.forEach(line=>{
   const c=line.split(",");
   if(c.length>=4){
     staData.push({
      sta:Number(c[0]),
      lat:Number(c[1]),
      lon:Number(c[2]),
      segment:c.slice(3).join(",").trim()
     });
   }
 });

 staData.sort((a,b)=>a.sta-b.sta);
 document.getElementById("status").innerHTML="GPS Ready";
 startGPS();
})
.catch(err=>{
 document.getElementById("status").innerHTML="CSV Load Failed";
 console.log(err);
});
</script>
</body>
</html>
